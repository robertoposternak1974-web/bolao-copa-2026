<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa 2026 🏆</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Barlow+Condensed:wght@500;600;700;800&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1B5E20;--green2:#2E7D32;--green3:#4CAF50;--greenlite:#E8F5E9;
  --gold:#C6982B;--gold2:#D4A843;--goldlite:#FFF8E1;
  --red:#C62828;--red2:#E53935;--blue:#1565C0;--cyan:#00838F;
  --bg:#f4f1ec;--bg2:#1a1a2e;--bg3:#16213e;
  --card:#ffffff;--card2:#fafaf5;--card3:#f5f0e8;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.15);
  --tx:#1a1a1a;--mu:#6b6b6b;--mu2:#8a8a7a;
  --fn:'Barlow',sans-serif;--fd:'Bebas Neue',cursive;--fc:'Barlow Condensed',sans-serif;--fo:'Oswald',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);font-size:14px;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px}
body::before{content:'';position:fixed;inset:0;background:
  repeating-linear-gradient(0deg,rgba(27,94,32,.03) 0px,rgba(27,94,32,.03) 1px,transparent 1px,transparent 4px),
  linear-gradient(180deg,rgba(27,94,32,.04) 0%,transparent 30%,transparent 70%,rgba(27,94,32,.03) 100%);
  pointer-events:none;z-index:0}

header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#0a0f1a,#1a1a2e);border-bottom:3px solid var(--gold);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 20px rgba(0,0,0,.3)}
.logo{font-family:var(--fd);font-size:26px;letter-spacing:3px;color:var(--gold);text-shadow:0 0 20px rgba(198,152,43,.3)}
.logo span{color:#fff}
.hdr-right{display:flex;align-items:center;gap:12px}
.user-sel{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;padding:6px 10px;border-radius:6px;font-size:12px;font-family:var(--fn);cursor:pointer}
.user-sel option{background:var(--bg2);color:#fff}
.hdr-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--fn);transition:all .15s}
.hdr-btn:hover{background:rgba(255,255,255,.15);color:#fff}

nav{display:flex;gap:2px;padding:8px 16px;background:linear-gradient(135deg,#12122a,#1a1a2e);border-bottom:1px solid rgba(198,152,43,.2);overflow-x:auto;flex-wrap:nowrap}
nav button{flex-shrink:0;background:transparent;border:none;color:rgba(255,255,255,.5);font-family:var(--fc);font-size:14px;font-weight:600;letter-spacing:.5px;padding:8px 16px;cursor:pointer;border-radius:6px;transition:all .15s;white-space:nowrap}
nav button:hover{color:#fff;background:rgba(255,255,255,.06)}
nav button.active{color:var(--gold);background:rgba(198,152,43,.12);border-bottom:2px solid var(--gold)}

main{max-width:1100px;margin:0 auto;padding:16px;position:relative;z-index:1}
.page{display:none}.page.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-title{font-family:var(--fo);font-size:17px;font-weight:700;color:var(--green);margin-bottom:10px;letter-spacing:.5px;text-transform:uppercase}

.welcome{text-align:center;padding:24px 20px 12px}
.welcome h1{font-family:var(--fd);font-size:44px;letter-spacing:3px;color:var(--green);text-shadow:2px 2px 0 rgba(27,94,32,.15)}
.welcome p{color:var(--mu);margin:6px 0 16px;font-size:14px}
.welcome .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{padding:10px 22px;border-radius:8px;border:none;font-family:var(--fc);font-size:15px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .15s}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:var(--green2)}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:var(--gold2)}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{opacity:.85}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--mu)}.btn-outline:hover{border-color:var(--green);color:var(--green)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:6px}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:var(--red2)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border:1px solid var(--border2);border-radius:14px;padding:28px;max-width:460px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h2{font-family:var(--fd);font-size:28px;letter-spacing:1px;margin-bottom:16px;color:var(--green)}
.modal label{display:block;font-size:12px;color:var(--mu);margin-bottom:4px;margin-top:12px}
.modal input,.modal select{width:100%;padding:10px;background:#f9f9f5;border:1px solid var(--border2);border-radius:8px;color:var(--tx);font-size:14px;font-family:var(--fn)}
.modal input:focus,.modal select:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(27,94,32,.1)}
.modal .modal-actions{display:flex;gap:10px;margin-top:20px}

.group-pills{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.group-pills button{background:#fff;border:1px solid var(--border2);color:var(--mu);padding:5px 10px;border-radius:6px;font-size:11px;font-family:var(--fc);font-weight:700;cursor:pointer;transition:all .15s}
.group-pills button:hover{border-color:var(--green);color:var(--green)}
.group-pills button.active{background:var(--green);border-color:var(--green);color:#fff}

.match{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.match.done{border-left:4px solid var(--green);background:linear-gradient(135deg,#f0faf0,#fff)}
.match.locked{border-left:4px solid var(--red);opacity:.8}
.match .m-teams{display:flex;align-items:center;justify-content:center;gap:6px}
.match .m-side{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0}
.match .m-side .flag{font-size:28px;line-height:1}
.match .m-side .m-name{font-weight:600;font-size:12px;color:var(--tx);text-align:center;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.match .m-side .m-score{font-family:var(--fd);font-size:36px;color:var(--gold);line-height:1}
.match .m-center{display:flex;flex-direction:column;align-items:center;min-width:36px;gap:2px}
.match .m-center .m-x{font-family:var(--fd);font-size:18px;color:var(--mu)}
.match .m-info{text-align:center;margin-top:6px;font-size:11px;color:var(--mu)}
.match .bet-display{font-size:12px;color:var(--blue);font-weight:700;background:rgba(21,101,192,.06);padding:3px 10px;border-radius:4px;text-align:center;margin-top:4px}
.match .pts-badge{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:4px;margin-top:4px}
.match-actions{display:flex;gap:6px;margin-top:8px;justify-content:center}
.date-header{font-family:var(--fo);font-size:13px;color:var(--green2);letter-spacing:1px;margin:16px 0 8px;padding:6px 10px;border-radius:6px;background:var(--greenlite);border-left:3px solid var(--green)}

.grp-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px}
.grp-tbl th{text-align:left;color:var(--mu);font-weight:600;padding:6px 8px;border-bottom:2px solid var(--green)}
.grp-tbl td{padding:6px 8px;border-bottom:1px solid var(--border)}
.grp-tbl tr:last-child td{border-bottom:none}
.grp-tbl .pos{font-weight:700;color:var(--gold);width:24px}
.grp-tbl .tflag{font-size:18px;margin-right:6px}
.grp-tbl .qual{background:rgba(27,94,32,.05)}

.ko-phase{margin-bottom:24px}
.ko-phase-title{font-family:var(--fd);font-size:22px;letter-spacing:2px;margin-bottom:12px;padding:8px 14px;border-radius:8px;display:inline-block}
.ko-phase-title.r32{background:rgba(21,101,192,.08);color:var(--blue)}
.ko-phase-title.r16{background:rgba(0,131,143,.08);color:var(--cyan)}
.ko-phase-title.qf{background:rgba(27,94,32,.08);color:var(--green)}
.ko-phase-title.sf{background:rgba(198,152,43,.1);color:var(--gold)}
.ko-phase-title.final{background:rgba(198,40,40,.08);color:var(--red)}
.ko-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.ko-match{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;position:relative;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.ko-match .ko-num{position:absolute;top:8px;right:10px;font-size:10px;color:var(--mu);font-family:var(--fc)}
.ko-match .ko-date{font-size:10px;color:var(--mu);margin-bottom:8px}
.ko-match .ko-slot{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;margin-bottom:4px;font-size:13px;font-weight:600;background:rgba(27,94,32,.04)}
.ko-match .ko-slot .ko-flag{font-size:18px}
.ko-match .ko-slot.tbd{color:var(--mu);font-style:italic;font-weight:400}
.ko-match .ko-vs{text-align:center;font-size:10px;color:var(--mu);margin:2px 0}
.ko-match select{width:100%;margin-top:6px;padding:6px;background:#f9f9f5;border:1px solid var(--border2);border-radius:6px;color:var(--tx);font-size:12px;font-family:var(--fn)}

.rank-row{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.rank-pos{font-family:var(--fd);font-size:28px;width:40px;text-align:center}
.rank-pos.g{color:var(--gold)}.rank-pos.s{color:#888}.rank-pos.b{color:#a06030}
.rank-name{flex:1;font-weight:600;font-size:14px}
.rank-pts{font-family:var(--fd);font-size:24px;color:var(--green);letter-spacing:1px}
.rank-bar{height:4px;background:#e8e8e0;border-radius:2px;margin-top:4px;overflow:hidden}
.rank-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--green3));border-radius:2px;transition:width .5s}

.cfg-section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.cfg-section h3{font-family:var(--fo);font-size:15px;color:var(--green);margin-bottom:12px;letter-spacing:.5px;text-transform:uppercase}
.cfg-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.cfg-row:last-child{border-bottom:none}
.cfg-row label{font-size:13px;color:var(--mu)}
.cfg-row input[type=number]{width:70px;padding:6px;background:#f9f9f5;border:1px solid var(--border2);border-radius:6px;color:var(--tx);font-size:14px;font-family:var(--fn);text-align:center}

.tut-step{display:flex;gap:16px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tut-num{font-family:var(--fd);font-size:36px;color:var(--gold);line-height:1;min-width:36px}
.tut-body h4{font-family:var(--fo);font-size:15px;color:var(--green);margin-bottom:4px}
.tut-body p{font-size:13px;color:var(--mu);line-height:1.5}

.score-tbl{width:100%;border-collapse:collapse;font-size:12px}
.score-tbl th{text-align:center;color:#fff;font-weight:600;padding:8px 6px;background:var(--green);position:sticky;top:0}
.score-tbl th:first-child{text-align:left;border-radius:6px 0 0 0}
.score-tbl th:last-child{border-radius:0 6px 0 0}
.score-tbl td{padding:8px 6px;border-bottom:1px solid var(--border);text-align:center}
.score-tbl td:first-child{text-align:left;font-weight:600}
.score-tbl .pts-cell{color:var(--green);font-weight:700}

.menu-item{display:block;width:100%;text-align:left;background:rgba(255,255,255,.05);border:none;color:#fff;padding:12px 16px;border-radius:8px;font-size:14px;font-family:var(--fn);cursor:pointer;transition:all .15s}
.menu-item:hover{background:rgba(255,255,255,.1)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 24px;border-radius:8px;font-weight:600;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:600px){
  header{padding:0 8px;height:52px;gap:4px}
  .logo{font-size:20px}
  .hdr-btn{padding:4px 8px;font-size:10px}
  main{padding:8px}
  .welcome h1{font-size:32px}
  .ko-grid{grid-template-columns:1fr}
  .match .m-side .m-name{font-size:11px}
  .match .m-side .m-score{font-size:30px}
  .match .m-side .flag{font-size:24px}
  .group-pills{gap:3px}
  .group-pills button{padding:4px 7px;font-size:10px}
  nav button{padding:6px 10px;font-size:12px}
}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>

function generateAllMatches(){
  const matches=[];let id=1;
  const base=new Date('2026-06-11');
  // 72 group matches
  GROUPS.forEach((g,gi)=>{
    const t=g.teams;
    const combos=[[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]];
    combos.forEach((c,ci)=>{
      const d=new Date(base);d.setDate(d.getDate()+gi+ci*5);
      const ds=d.toISOString().slice(0,10);
      const hr=(ci%3===0)?'13:00':(ci%3===1)?'16:00':'19:00';
      matches.push({id,group:g.id,phase:'group',home:t[c[0]].n,away:t[c[1]].n,hf:t[c[0]].f,af:t[c[1]].f,date:ds,time:hr,venue:ALL_VENUES[(id-1)%ALL_VENUES.length],status:'open',score:null});
      id++;
    });
  });
  // Knockout matches (73-104) from R32, R16, QF, SF, 3rd, Final
  // Assign realistic kickoff times based on venue timezone
  const koTimes={
    73:'15:00',74:'16:30',75:'21:00',76:'13:00',77:'17:00',78:'13:00',79:'21:00',80:'12:00',
    81:'17:00',82:'16:00',83:'19:00',84:'15:00',85:'23:00',86:'18:00',87:'20:30',88:'13:00',
    89:'13:00',90:'17:00',91:'16:00',92:'20:00',93:'13:00',94:'17:00',95:'20:00',96:'16:00',
    97:'13:00',98:'17:00',99:'13:00',100:'16:30',
    101:'17:00',102:'16:00',
    103:'18:00',104:'16:00'
  };
  const koSets=[
    {arr:R32_MATCHES,phase:'r32'},{arr:R16_MATCHES,phase:'r16'},
    {arr:QF_MATCHES,phase:'qf'},{arr:SF_MATCHES,phase:'sf'},
    {arr:[THIRD_MATCH],phase:'3rd'},{arr:[FINAL_MATCH],phase:'final'}
  ];
  koSets.forEach(({arr,phase})=>{
    arr.forEach(km=>{
      const t=koTimes[km.num]||'16:00';
      matches.push({id:km.num,group:null,phase,home:km.home,away:km.away,hf:'🏳️',af:'🏳️',date:'2026-'+km.date.split('/').reverse().join('-'),time:t,venue:km.venue,status:'open',score:null,koKey:km.hk||'',koAway:km.ak||'',feeds:km.feeds||[]});
    });
  });
  return matches;
}

// RTDB keys can't contain . # $ [ ] /
function encodeKey(s){return s.replace(/[.#$\[\]\/]/g,'_')}

function startRealtimeSync(){
  if(!fbReady||!bolaoDocId)return;
  // Listen to match results
  rtdb.ref('bolaos/'+bolaoDocId+'/matches').on('value',snap=>{
    if(isDemoMode||!snap.exists())return;
    const serverMatches=snap.val();
    if(!Array.isArray(serverMatches))return;
    serverMatches.forEach(sm=>{
      if(!sm)return;
      const lm=S.matches.find(m=>m.id===sm.id);
      if(lm){
        if(sm.status==='done'&&sm.score){lm.score=sm.score;lm.status='done';lm.autoFetched=sm.autoFetched||false}
        if(sm.home&&!sm.home.startsWith('1º')&&!sm.home.startsWith('2º')&&!sm.home.startsWith('Venc.')&&!sm.home.startsWith('Perd.')){
          lm.home=sm.home;lm.hf=sm.hf||lm.hf;lm.away=sm.away;lm.af=sm.af||lm.af;
        }
      }
    });
    localStorage.setItem('bolao2026_v5',JSON.stringify(S));
    render();
  });
  // Listen to config changes
  rtdb.ref('bolaos/'+bolaoDocId+'/config').on('value',snap=>{
    if(isDemoMode||!snap.exists())return;
    const cfg=snap.val();
    if(cfg.scoring)S.scoring=cfg.scoring;
    if(cfg.bolaoName)S.bolaoName=cfg.bolaoName;
    if(cfg.valorAposta!==undefined)S.valorAposta=cfg.valorAposta;
    if(cfg.paymentInfo)S.paymentInfo=cfg.paymentInfo;
    localStorage.setItem('bolao2026_v5',JSON.stringify(S));
  });
  // Listen to payments
  rtdb.ref('bolaos/'+bolaoDocId+'/payments').on('value',snap=>{
    if(isDemoMode)return;
    S.payments=snap.exists()?snap.val():{};
    localStorage.setItem('bolao2026_v5',JSON.stringify(S));
    render();
  });
  // Listen to all users (for ranking)
  rtdb.ref('bolaos/'+bolaoDocId+'/users').on('value',snap=>{
    if(isDemoMode||!snap.exists())return;
    snap.forEach(child=>{
      const d=child.val();if(!d||!d.name)return;
      if(!S.users.find(u=>u.name===d.name)){
        S.users.push({name:d.name,email:d.email||'',pass:'',isAdmin:d.isAdmin||false});
      }
      try{S.bets[d.name]=JSON.parse(d.bets||'{}')}catch(e){}
      try{S.groupBets[d.name]=JSON.parse(d.groupBets||'{}')}catch(e){}
      try{S.knockoutBets[d.name]=JSON.parse(d.knockoutBets||'{}')}catch(e){}
    });
    localStorage.setItem('bolao2026_v5',JSON.stringify(S));
    render();
  });
}

async function doJoin(){
  const c=document.getElementById('mC').value.trim().toUpperCase();
  const n=document.getElementById('mUN').value.trim();
  const e=document.getElementById('mUE').value.trim().toLowerCase();
  const p=document.getElementById('mUP').value;

  if(p.length<6)return toast('Senha deve ter no mínimo 6 caracteres');

  // Try Firebase first
  if(fbReady){
    try{
      const snap=await rtdb.ref('bolaos/'+c+'/config').once('value');
      if(snap.exists()){
        // Bolão found in Firebase!
        const cfg=snap.val();
        S.bolaoName=cfg.bolaoName;
        S.bolaoCode=cfg.bolaoCode||c;
        S.scoring=cfg.scoring||S.scoring;
        bolaoDocId=c;
        localStorage.setItem('bolao_docId',c);
        // Auth
        let cred;
        try{cred=await auth.createUserWithEmailAndPassword(e,p)}
        catch(err){
          if(err.code==='auth/email-already-in-use')cred=await auth.signInWithEmailAndPassword(e,p);
          else throw err;
        }
        await cred.user.updateProfile({displayName:n});
        // Add user to Firebase
        await rtdb.ref('bolaos/'+c+'/users/'+encodeKey(n)).set({
          name:n,email:e,isAdmin:false,uid:cred.user.uid,
          bets:'{}',groupBets:'{}',knockoutBets:'{}'
        });
        // Update local state
        if(!S.users.find(u=>u.name===n)){
          S.users.push({name:n,email:e,pass:p,isAdmin:false});
        }
        S.bets[n]=S.bets[n]||{};S.groupBets[n]=S.groupBets[n]||{};S.knockoutBets[n]=S.knockoutBets[n]||{};
        S.currentUser=n;S.isAdmin=false;
        saveState();startRealtimeSync();
        closeModal();toast('☁️ Bem-vindo, '+n+'!');openModal('disclaimer');
        return;
      }
    }catch(err){console.warn('Firebase join error:',err)}
  }

  // Fallback: local check
  if(c!==S.bolaoCode)return toast('Código inválido!');
  if(S.users.find(u=>u.name===n))return toast('Nome já existe!');
  S.users.push({name:n,email:e,pass:p,isAdmin:false});
  S.bets[n]={};S.groupBets[n]={};S.knockoutBets[n]={};
  S.currentUser=n;S.isAdmin=false;
  saveState();closeModal();toast('Bem-vindo, '+n+'!');openModal('disclaimer');
}

// Check if match is locked (10 min before kickoff)
function isMatchLocked(m){
  if(m.status==='done') return true;
  if(!m.date||m.time==='TBD') return false;
  try{
    const [hh,mm]=m.time.split(':').map(Number);
    const kickoff=new Date(m.date+'T'+m.time+':00');
    if(isNaN(kickoff.getTime())) return false;
    const lockTime=new Date(kickoff.getTime()-10*60*1000);
    return new Date()>=lockTime;
  }catch(e){return false}
}
function lockCountdown(m){
  if(!m.date||m.time==='TBD') return '';
  try{
    const kickoff=new Date(m.date+'T'+m.time+':00');
    const lock=new Date(kickoff.getTime()-10*60*1000);
    const now=new Date();
    if(now>=lock) return '🔒 Travado';
    const diff=lock-now;
    const days=Math.floor(diff/86400000);
    const hrs=Math.floor((diff%86400000)/3600000);
    if(days>0) return `⏳ Trava em ${days}d ${hrs}h`;
    const mins=Math.floor((diff%3600000)/60000);
    if(hrs>0) return `⏳ Trava em ${hrs}h${mins}m`;
    return `⏳ Trava em ${mins}min`;
  }catch(e){return ''}
}

function doBet(id){

  if(isNaN(h)||isNaN(a)||h<0||a<0)return toast('Placar inválido');

}
function clearBet(id){

// ═══ SCORING ═══
function calcMatchPts(bet,score){if(!bet||!score)return 0;const s=S.scoring;if(bet.h===score.h&&bet.a===score.a)return s.exact;const br=bet.h>bet.a?'H':(bet.h<bet.a?'A':'D'),rr=score.h>score.a?'H':(score.h<score.a?'A':'D');if(br===rr)return rr==='D'?s.draw:s.winner;return 0}
function calcTotalPts(u){let t=0;const ub=S.bets[u]||{};S.matches.filter(m=>m.status==='done').forEach(m=>{t+=calcMatchPts(ub[m.id],m.score)});return t}
function getRanking(){return S.users.map(u=>({name:u.name,pts:calcTotalPts(u.name)})).sort((a,b)=>b.pts-a.pts)}
function calcAllStandings(){const r={};GROUPS.forEach(g=>{const t={};g.teams.forEach(x=>{t[x.n]={name:x.n,flag:x.f,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}});S.matches.filter(m=>m.group===g.id&&m.status==='done').forEach(m=>{const h=t[m.home],a=t[m.away];if(!h||!a)return;h.p++;a.p++;h.gf+=m.score.h;h.ga+=m.score.a;a.gf+=m.score.a;a.ga+=m.score.h;if(m.score.h>m.score.a){h.w++;a.l++;h.pts+=3}else if(m.score.h<m.score.a){a.w++;h.l++;a.pts+=3}else{h.d++;a.d++;h.pts++;a.pts++}});r[g.id]=Object.values(t).sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf)});return r}

// ═══ AUTO-PROPAGATE KNOCKOUT TEAMS ═══
function propagateKnockout(){
  const standings=calcAllStandings();

  // Helper: get team at position in group (0-indexed)
  function grpTeam(grpId,pos){
    const s=standings[grpId];
    if(!s||!s[pos]||s[pos].p<3) return null; // need all 3 games played
    return {n:s[pos].name,f:s[pos].flag};
  }

  // Helper: get winner of a finished match
  function matchWinner(matchId){
    const m=S.matches.find(x=>x.id===matchId);
    if(!m||m.status!=='done')return null;
    if(m.score.h>m.score.a) return {n:m.home,f:m.hf};
    if(m.score.a>m.score.h) return {n:m.away,f:m.af};
    // Draw in knockout = need penalties, treat as TBD for now
    // Admin can set via editTeams
    return null;
  }

  // Helper: get loser of a finished match
  function matchLoser(matchId){
    const m=S.matches.find(x=>x.id===matchId);
    if(!m||m.status!=='done')return null;
    if(m.score.h>m.score.a) return {n:m.away,f:m.af};
    if(m.score.a>m.score.h) return {n:m.home,f:m.hf};
    return null;
  }

  // Check if all groups finished
  function grpDone(grpId){
    return S.matches.filter(m=>m.group===grpId).every(m=>m.status==='done');
  }

  // Update a knockout match's home/away if we know the team
  function setKO(matchId,side,team){
    if(!team)return;
    const m=S.matches.find(x=>x.id===matchId);
    if(!m)return;
    if(side==='home'&&(m.home!==team.n)){m.home=team.n;m.hf=team.f;}
    if(side==='away'&&(m.away!==team.n)){m.away=team.n;m.af=team.f;}
  }

  // R32: populate from group standings (1st and 2nd places)
  // hk format: '1A' = 1st of group A, '2B' = 2nd of group B, '3X' = 3rd place (skip for now)
  const r32map={
    73:{h:'2A',a:'2B'}, 74:{h:'1E',a:null}, 75:{h:'1F',a:'2C'}, 76:{h:'1C',a:'2F'},
    77:{h:'1I',a:null}, 78:{h:'2E',a:'2I'}, 79:{h:'1A',a:null}, 80:{h:'1L',a:null},
    81:{h:'1D',a:null}, 82:{h:'1G',a:null}, 83:{h:'2K',a:'2L'}, 84:{h:'1H',a:'2J'},
    85:{h:'1B',a:null}, 86:{h:'1J',a:'2H'}, 87:{h:'1K',a:null}, 88:{h:'2D',a:'2G'}
  };

  for(const[id,slots] of Object.entries(r32map)){
    const mid=parseInt(id);
    if(slots.h){
      const pos=parseInt(slots.h[0])-1; // 1->0, 2->1
      const grp=slots.h[1];
      if(grpDone(grp)){
        const team=grpTeam(grp,pos);
        if(team) setKO(mid,'home',team);
      }
    }
    if(slots.a){
      const pos=parseInt(slots.a[0])-1;
      const grp=slots.a[1];
      if(grpDone(grp)){
        const team=grpTeam(grp,pos);
        if(team) setKO(mid,'away',team);
      }
    }
  }

  // R16 onwards: populate from winners of previous round
  const feedMatches=[
    ...R16_MATCHES,...QF_MATCHES,...SF_MATCHES,
  ];
  feedMatches.forEach(km=>{
    if(!km.feeds||km.feeds.length!==2)return;
    const w1=matchWinner(km.feeds[0]);
    const w2=matchWinner(km.feeds[1]);
    if(w1) setKO(km.num,'home',w1);
    if(w2) setKO(km.num,'away',w2);
  });

  // 3rd place match: losers of semifinals
  if(THIRD_MATCH.feeds&&THIRD_MATCH.feeds.length===2){
    const l1=matchLoser(THIRD_MATCH.feeds[0]);
    const l2=matchLoser(THIRD_MATCH.feeds[1]);
    if(l1) setKO(THIRD_MATCH.num,'home',l1);
    if(l2) setKO(THIRD_MATCH.num,'away',l2);
  }

  // Final match
  if(FINAL_MATCH.feeds&&FINAL_MATCH.feeds.length===2){
    const w1=matchWinner(FINAL_MATCH.feeds[0]);
    const w2=matchWinner(FINAL_MATCH.feeds[1]);
    if(w1) setKO(FINAL_MATCH.num,'home',w1);
    if(w2) setKO(FINAL_MATCH.num,'away',w2);
  }

  saveState();
}

async function doHomeLogin(){
  const e=(document.getElementById('homeEmail').value||'').trim().toLowerCase();
  const p=document.getElementById('homePass').value;
  if(!e||!p)return toast('Preencha e-mail e senha');
  if(fbReady){
    try{
      const cred=await auth.signInWithEmailAndPassword(e,p);
      const uid=cred.user.uid;
      let foundBolao=null;
      const bolaosSnap=await rtdb.ref('bolaos').once('value');
      if(bolaosSnap.exists()){
        bolaosSnap.forEach(function(bolaoChild){
          const bk=bolaoChild.key,bd=bolaoChild.val();
          if(!bd||!bd.users)return;
          Object.values(bd.users).forEach(function(u){
            if(u&&(u.email===e||u.uid===uid))foundBolao={key:bk,data:bd};
          });
        });
      }
      if(foundBolao){
        bolaoDocId=foundBolao.key;
        localStorage.setItem('bolao_docId',bolaoDocId);
        const cfg=foundBolao.data.config||{};
        S.bolaoName=cfg.bolaoName||'';S.bolaoCode=cfg.bolaoCode||bolaoDocId;
        S.scoring=cfg.scoring||S.scoring;S.valorAposta=cfg.valorAposta||0;
        S.paymentInfo=cfg.paymentInfo||{};S.payments=foundBolao.data.payments||{};
        S.users=[];S.bets={};S.groupBets={};S.knockoutBets={};
        if(foundBolao.data.users){Object.values(foundBolao.data.users).forEach(function(d){
          if(!d||!d.name)return;
          S.users.push({name:d.name,email:d.email||'',pass:'',isAdmin:d.isAdmin||false});
          try{S.bets[d.name]=JSON.parse(d.bets||'{}')}catch(ex){}
          try{S.groupBets[d.name]=JSON.parse(d.groupBets||'{}')}catch(ex){}
          try{S.knockoutBets[d.name]=JSON.parse(d.knockoutBets||'{}')}catch(ex){}
        })}
        if(foundBolao.data.matches&&Array.isArray(foundBolao.data.matches)){
          foundBolao.data.matches.forEach(function(sm){
            if(!sm)return;var lm=S.matches.find(function(m){return m.id===sm.id});
            if(lm){if(sm.status==='done'&&sm.score){lm.score=sm.score;lm.status='done'}
            if(sm.home){lm.home=sm.home;lm.hf=sm.hf||lm.hf;lm.away=sm.away;lm.af=sm.af||lm.af}}
          });
        }
        var me=S.users.find(function(u){return(u.email||'')===e});
        if(me){S.currentUser=me.name;S.isAdmin=me.isAdmin;saveState();startRealtimeSync();currentTab='jogos';toast('Bem-vindo, '+me.name+'!');render();return}
      }else{return toast('Nenhum bolão encontrado para este e-mail')}
    }catch(ex){
      console.warn('FB login:',ex.code,ex.message);
      if(ex.code==='auth/wrong-password'||ex.code==='auth/invalid-credential')return toast('Senha incorreta');
      if(ex.code==='auth/user-not-found')return toast('E-mail não cadastrado');
      if(ex.code==='auth/too-many-requests')return toast('Muitas tentativas. Aguarde.');
      return toast('Erro: '+(ex.message||ex.code));
    }
  }
  var u=S.users.find(function(x){return(x.email||'')===e&&x.pass===p});
  if(!u)return toast('E-mail ou senha incorretos');
  S.currentUser=u.name;S.isAdmin=u.isAdmin;saveState();toast('Bem-vindo, '+u.name+'!');render();
}

  const phases=['group','r32','r16','qf','sf','3rd','final'];
  const ub=S.bets[S.currentUser]||{};

  if(phaseFilter==='group'){
    gms=groupFilter==='ALL'?S.matches.filter(m=>m.phase==='group'):S.matches.filter(m=>m.group===groupFilter);
  } else {
    gms=S.matches.filter(m=>m.phase===phaseFilter);

  const bc=gms.filter(m=>ub[m.id]).length;

  // Phase pills
  h+=`<div class="group-pills" style="margin-bottom:8px">`;
  phases.forEach(p=>{

  // Phase info for knockout
  if(phaseFilter!=='group'){
    h+=`<div class="card" style="margin-bottom:12px;border-left:3px solid var(--cyan);padding:12px"><p style="font-size:12px;color:var(--mu2)">Os times serão definidos conforme a fase de grupos. Dê seu palpite no <strong style="color:var(--tx)">placar</strong> de cada jogo. O admin preencherá os nomes dos times quando forem conhecidos.</p></div>`;
  }

  const days=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const byDate={};gms.forEach(m=>{const dk=m.date||'TBD';if(!byDate[dk])byDate[dk]=[];byDate[dk].push(m)});

  Object.keys(byDate).sort().forEach(date=>{
    if(date!=='TBD'){const d=new Date(date+'T12:00:00');h+=`<div class="date-header">📅 ${days[d.getDay()]}, ${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}</div>`}

    byDate[date].forEach(m=>{
      const bet=ub[m.id];const pts=m.status==='done'&&bet?calcMatchPts(bet,m.score):null;
      const locked=isMatchLocked(m);
      const lockInfo=lockCountdown(m);
      const phaseTag=m.phase!=='group'?`<span style="font-size:10px;color:var(--cyan);background:rgba(0,229,255,.1);padding:2px 6px;border-radius:4px;margin-left:4px">Jogo ${m.id}</span>`:(m.group?`<span style="font-size:10px;color:var(--mu)">Grupo ${m.group}</span>`:'');
      const hsc=m.status==='done'?m.score.h:'';
      const asc=m.status==='done'?m.score.a:'';
      h+=`<div class="match ${m.status==='done'?'done':''}${locked&&m.status!=='done'?' locked':''}">
        <div class="m-teams">
          <div class="m-side">
            <div class="flag">${m.hf}</div>
            <div class="m-name">${m.home}</div>
            ${m.status==='done'?`<div class="m-score">${hsc}</div>`:''}
          </div>
          <div class="m-center">
            ${m.status==='done'?`<div class="m-x">×</div>`:`<div style="font-size:11px;text-align:center">${m.time}</div><div class="m-x">×</div>`}
          </div>
          <div class="m-side">
            <div class="flag">${m.af}</div>
            <div class="m-name">${m.away}</div>
            ${m.status==='done'?`<div class="m-score">${asc}</div>`:''}
          </div>
        </div>
        <div class="m-info">
          ${m.status==='done'?`<span style="color:var(--green);font-weight:700">FINAL</span>`:`${phaseTag}`}
          ${lockInfo&&m.status!=='done'?` · <span style="color:${locked?'var(--red)':'var(--mu)'}"> ${lockInfo}</span>`:''}
        </div>
        ${bet?`<div class="bet-display">🔒 Meu palpite: ${bet.h} × ${bet.a}</div>`:''}
        ${pts!==null?`<div style="text-align:center"><span class="pts-badge" style="${pts>=10?'background:#1B5E20;color:#fff':pts>=5?'background:#4CAF50;color:#fff':pts>=3?'background:#A5D6A7;color:#1B5E20':'background:var(--greenlite);color:var(--green)'}">${pts===0?'0 pts':'+'+pts+' pts'}</span></div>`:''}
        ${m.status==='done'&&!bet?'<div style="text-align:center;font-size:12px;color:var(--red);font-weight:600;margin-top:4px">Sem palpite</div>':''}
        <div class="match-actions">
          ${m.status==='open'&&!locked?`<button class="btn btn-sm btn-green" onclick="openModal('bet',S.matches.find(x=>x.id===${m.id}))">Palpitar</button>`:''}
          ${m.status==='open'&&locked&&!bet?`<span style="font-size:11px;color:var(--red)">🔒 Travado</span>`:''}
          ${m.status==='done'&&m.autoFetched?`<span style="font-size:10px;color:var(--cyan)">📡 Auto</span>`:''}
          ${S.isAdmin&&m.phase!=='group'&&m.status!=='done'?`<button class="btn btn-sm btn-outline" onclick="openModal('editTeams',S.matches.find(x=>x.id===${m.id}))">Times</button>`:''}
        </div>
      </div>`;
    });
  });
  return h;
}

function togglePayment(userName){
  if(!S.payments) S.payments={};
  const current=S.payments[userName];
  if(current&&current.status==='pago'){
    delete S.payments[userName];
  } else {
    S.payments[userName]={status:'pago',data:new Date().toISOString()};
  }
  saveState();
  if(fbReady&&bolaoDocId){
    rtdb.ref('bolaos/'+bolaoDocId+'/payments').set(S.payments).catch(e=>console.warn(e));
  }
  render();
  toast(S.payments[userName]?'✅ Pagamento confirmado':'↩️ Pagamento revertido');
}

function saveFinanceiro(){
  const valor=parseFloat(document.getElementById('efValor').value)||0;
  const tipo=document.getElementById('efTipo').value;
  let payInfo={};
  if(tipo==='pix'){
    payInfo={tipo:'pix',chave:document.getElementById('efPixKey').value.trim(),nome:document.getElementById('efPixNome').value.trim()};
  } else {
    payInfo={tipo:'banco',codBanco:document.getElementById('efBancoCod').value.trim(),banco:document.getElementById('efBancoNome').value.trim(),agencia:document.getElementById('efAgencia').value.trim(),conta:document.getElementById('efConta').value.trim(),titular:document.getElementById('efTitular').value.trim(),cpfCnpj:document.getElementById('efCpf').value.trim()};
  }
  S.valorAposta=valor;
  S.paymentInfo=payInfo;
  saveState();
  if(fbReady&&bolaoDocId){
    rtdb.ref('bolaos/'+bolaoDocId+'/config').update({valorAposta:valor,paymentInfo:payInfo}).catch(e=>console.warn(e));
  }
  closeModal();toast('💰 Dados financeiros atualizados!');render();
}

function enviarComprovante(){
  const fileInput=document.getElementById('comprovanteFile');
  if(!fileInput.files.length) return toast('Selecione um arquivo');
  const file=fileInput.files[0];
  const reader=new FileReader();
  reader.onload=function(e){
    const base64=e.target.result;
    // Save comprovante reference
    if(!S.payments) S.payments={};
    if(!S.payments[S.currentUser]) S.payments[S.currentUser]={};
    S.payments[S.currentUser].comprovante={nome:file.name,data:new Date().toISOString()};
    saveState();
    if(fbReady&&bolaoDocId){
      rtdb.ref('bolaos/'+bolaoDocId+'/payments/'+encodeKey(S.currentUser)).set(
        S.payments[S.currentUser]
      ).catch(e=>console.warn(e));
    }
    // Save comprovante image as base64 in Firebase (admin can view)
    if(fbReady&&bolaoDocId){
      // Limit to 500KB for Firebase
      if(base64.length > 700000){
        toast('⚠️ Arquivo muito grande. Use uma imagem menor.');
        return;
      }
      rtdb.ref('bolaos/'+bolaoDocId+'/comprovantes/'+encodeKey(S.currentUser)).set({
        nome:file.name,data:new Date().toISOString(),
        imagem:base64,user:S.currentUser
      }).then(()=>toast('📤 Comprovante enviado!')).catch(e=>{console.warn(e);toast('Erro ao enviar')});
    } else {
      toast('📎 Comprovante salvo localmente.');
    }
    render();
  };
  reader.readAsDataURL(file);
}

  h+=[['group1st','Acertar 1º do grupo'],['group2nd','Acertar 2º do grupo']].map(([k,l])=>`<div class="cfg-row"><label>${l}</label><input type="number" min="0" value="${S.scoring[k]}" onchange="S.scoring.${k}=parseInt(this.value);saveState();toast('Salvo!')"></div>`).join('');
  h+=`<div style="font-family:var(--fc);font-size:12px;color:var(--cyan);margin:14px 0 6px;letter-spacing:1px">FASES MATA-MATA</div>`;

  const phaseOrder=[

    {key:'sf',label:'⚔ SEMIFINAIS',color:'var(--gold2)'},

    {key:'final',label:'🏆 FINAL',color:'var(--red)'},
  ];

  phaseOrder.forEach(ph=>{
    const phaseMatches=S.matches.filter(m=>m.phase===ph.key);
    const done=phaseMatches.filter(m=>m.status==='done');

  h+=`<div class="cfg-section" style="border-left:3px solid var(--blue)">
    <h3>👥 PARTICIPANTES (${S.users.length})</h3>`;
  h+=S.users.map(u=>`<div class="cfg-row"><label>${u.isAdmin?'👑':''} ${u.name}</label>${!u.isAdmin?`<button class="btn btn-sm btn-red" onclick="if(confirm('Remover ${u.name}?')){S.users=S.users.filter(x=>x.name!=='${u.name}');delete S.bets['${u.name}'];delete S.groupBets['${u.name}'];delete S.knockoutBets['${u.name}'];saveState();render()}">Remover</button>`:'<span style="color:var(--gold);font-size:11px">Admin</span>'}</div>`).join('');
  h+=`</div>`;

  return h;
}

function doManualResult(){
  const sel=document.getElementById('cfgMatchSel');
  if(!sel||!sel.value)return toast('Selecione um jogo');
  const id=parseInt(sel.value);
  const h=parseInt(document.getElementById('cfgResH').value);
  const a=parseInt(document.getElementById('cfgResA').value);
  if(isNaN(h)||isNaN(a)||h<0||a<0)return toast('Placar inválido');
  const m=S.matches.find(x=>x.id===id);
  m.score={h,a};m.status='done';m.autoFetched=false;
  saveState();propagateKnockout();toast('Resultado registrado!');render();
}

function doManualResultPhase(selId,hId,aId){
  const sel=document.getElementById(selId);
  if(!sel||!sel.value)return toast('Selecione um jogo');
  const id=parseInt(sel.value);
  const h=parseInt(document.getElementById(hId).value);
  const a=parseInt(document.getElementById(aId).value);
  if(isNaN(h)||isNaN(a)||h<0||a<0)return toast('Placar inválido');
  const m=S.matches.find(x=>x.id===id);
  m.score={h,a};m.status='done';m.autoFetched=false;
  saveState();propagateKnockout();toast('Resultado registrado!');render();
}

// ═══ AUTO-FETCH RESULTS ═══
let autoFetchInterval=null,fetchLog=[];
function getMatchEndEstimate(m){
  if(!m.date||m.time==='TBD')return null;
  try{const k=new Date(m.date+'T'+m.time+':00');if(isNaN(k.getTime()))return null;
  return new Date(k.getTime()+(m.phase==='group'?105:135)*60000)}catch(e){return null}
}
function getMatchesNeedingResults(){
  const now=new Date();
  return S.matches.filter(m=>{
    if(m.status==='done')return false;
    if(m.home.startsWith('1º ')||m.home.startsWith('2º ')||m.home.startsWith('Venc.')||m.home.startsWith('Perd.'))return false;
    const end=getMatchEndEstimate(m);if(!end)return false;
    return now>=new Date(end.getTime()+30*60000);
  });
}
async function fetchResultsFromAPI(){
  const pending=getMatchesNeedingResults();if(!pending.length)return;
  for(const m of pending){
    try{
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,
          tools:[{type:'web_search_20250305',name:'web_search'}],
          messages:[{role:'user',content:`Busque resultado FINAL: "${m.home} vs ${m.away}" Copa do Mundo 2026 (jogo ${m.id}, ${m.date}). Retorne APENAS JSON: {"home_score":X,"away_score":Y,"status":"final"} ou {"status":"not_found"}. Só JSON.`}]
        })
      });
      const data=await resp.json();
      const text=data.content?.map(c=>c.text||'').join('')||'';
      const jm=text.match(/\{[^}]+\}/);
      if(jm){const r=JSON.parse(jm[0]);
        if(r.status==='final'&&typeof r.home_score==='number'){
          m.score={h:r.home_score,a:r.away_score};m.status='done';m.autoFetched=true;
          fetchLog.push({id:m.id,t:new Date().toLocaleTimeString()});saveState();propagateKnockout();
        }
      }
    }catch(e){console.error('fetch err',m.id,e)}
  }
  render();
}
function startAutoFetch(){
  if(autoFetchInterval)return;
  setTimeout(fetchResultsFromAPI,5000);
  autoFetchInterval=setInterval(fetchResultsFromAPI,30*60000);
}

if(S.bolaoName&&S.currentUser){currentTab='jogos';propagateKnockout();startAutoFetch();fbRestoreSession()}

// ═══ MODO DEMONSTRAÇÃO (isolado do app real) ═══

function runSimulation(){
  // Save real state aside
  realState=localStorage.getItem('bolao2026_v5');
  isDemoMode=true;

  // Build demo state entirely in memory
  const demoS={bolaoName:'Bolão da Galera ⚽',bolaoCode:'DEMO00',users:[],currentUser:'Roberto',isAdmin:true,matches:generateAllMatches(),knockoutBets:{},groupBets:{},scoring:{...DEFAULT_SCORING},bets:{}};

  // Patch times
  const koTimes={73:'15:00',74:'16:30',75:'21:00',76:'13:00',77:'17:00',78:'13:00',79:'21:00',80:'12:00',81:'17:00',82:'16:00',83:'19:00',84:'15:00',85:'23:00',86:'18:00',87:'20:30',88:'13:00',89:'13:00',90:'17:00',91:'16:00',92:'20:00',93:'13:00',94:'17:00',95:'20:00',96:'16:00',97:'13:00',98:'17:00',99:'13:00',100:'16:30',101:'17:00',102:'16:00',103:'18:00',104:'16:00'};
  demoS.matches.forEach(m=>{if(m.time==='TBD'&&koTimes[m.id])m.time=koTimes[m.id]});

  // 20 participants
  const names=['Roberto','Carlos','Ana','Pedro','Juliana','Marcos','Fernanda','Lucas','Camila','Rafael','Beatriz','Thiago','Mariana','Diego','Larissa','Bruno','Patricia','Gustavo','Daniela','Felipe'];
  names.forEach((n,i)=>{
    demoS.users.push({name:n,email:n.toLowerCase()+'@demo.com',pass:'demo',isAdmin:i===0});
    demoS.bets[n]={};demoS.groupBets[n]={};demoS.knockoutBets[n]={};
  });

  function rndGoals(){const r=Math.random();if(r<.25)return 0;if(r<.55)return 1;if(r<.8)return 2;if(r<.93)return 3;return 4;}
  function rndKO(){let h=rndGoals(),a=rndGoals();if(h===a)h++;return{h,a};}

  // Generate bets
  demoS.users.forEach(u=>{
    demoS.matches.forEach(m=>{demoS.bets[u.name][m.id]={h:rndGoals(),a:rndGoals()}});
    GROUPS.forEach(g=>{
      const sh=[...g.teams].sort(()=>Math.random()-.5);
      demoS.groupBets[u.name][g.id+'_1st']=sh[0].n;
      demoS.groupBets[u.name][g.id+'_2nd']=sh[1].n;
    });
    const allT=allTeamNames();
    const pick=()=>allT[Math.floor(Math.random()*allT.length)];
    R32_MATCHES.forEach(m=>{demoS.knockoutBets[u.name]['r32_'+m.num+'_w']=pick()});
    R16_MATCHES.forEach(m=>{demoS.knockoutBets[u.name]['r16_'+m.num+'_w']=pick()});
    QF_MATCHES.forEach(m=>{demoS.knockoutBets[u.name]['qf_'+m.num+'_w']=pick()});
    SF_MATCHES.forEach(m=>{demoS.knockoutBets[u.name]['sf_'+m.num+'_w']=pick()});
    demoS.knockoutBets[u.name]['final_104_w']=pick();
  });

  // ═══ SIMULATE ALL GROUP MATCHES (72 jogos) ═══
  GROUPS.forEach((g,gi)=>{
    for(let j=0;j<6;j++){
      const m=demoS.matches[gi*6+j];
      if(m&&m.phase==='group'){m.score={h:rndGoals(),a:rndGoals()};m.status='done';m.autoFetched=true;}
    }
  });

  // Load into S and propagate to fill R32 teams
  S=demoS;
  propagateKnockout();

  // ═══ SIMULATE R32 (16 jogos) ═══
  S.matches.filter(m=>m.phase==='r32').forEach(m=>{
    if(m.home.startsWith('1º')||m.home.startsWith('2º')||m.home.startsWith('3º')||m.away.startsWith('1º')||m.away.startsWith('2º')||m.away.startsWith('3º'))return;
    const sc=rndKO();m.score=sc;m.status='done';m.autoFetched=true;
  });
  propagateKnockout();

  // ═══ SIMULATE R16 (8 jogos) ═══
  S.matches.filter(m=>m.phase==='r16').forEach(m=>{
    if(m.home.startsWith('Venc.')||m.away.startsWith('Venc.'))return;
    const sc=rndKO();m.score=sc;m.status='done';m.autoFetched=true;
  });
  propagateKnockout();

  // ═══ SIMULATE QUARTAS (4 jogos) ═══
  S.matches.filter(m=>m.phase==='qf').forEach(m=>{
    if(m.home.startsWith('Venc.')||m.away.startsWith('Venc.'))return;
    const sc=rndKO();m.score=sc;m.status='done';m.autoFetched=true;
  });
  propagateKnockout();

  // ═══ SIMULATE SEMIS (2 jogos) ═══
  S.matches.filter(m=>m.phase==='sf').forEach(m=>{
    if(m.home.startsWith('Venc.')||m.away.startsWith('Venc.'))return;
    const sc=rndKO();m.score=sc;m.status='done';m.autoFetched=true;
  });
  propagateKnockout();

  // ═══ SIMULATE 3RD PLACE + FINAL ═══
  S.matches.filter(m=>m.phase==='3rd'||m.phase==='final').forEach(m=>{
    if(m.home.startsWith('Venc.')||m.home.startsWith('Perd.')||m.away.startsWith('Venc.')||m.away.startsWith('Perd.'))return;
    const sc=rndKO();m.score=sc;m.status='done';m.autoFetched=true;
  });
  propagateKnockout();

  currentTab='ranking';phaseFilter='group';groupFilter='ALL';
  render();
  toast('🎮 DEMO completa: todos os 104 jogos simulados!');
}

function exitDemo(){
  isDemoMode=false;
  // Restore real state
  if(realState){
    S=JSON.parse(realState);
  } else {
    localStorage.removeItem('bolao2026_v5');
    S=getState();
  }
  realState=null;
  currentTab='home';
  render();
  toast('Saiu do modo demonstração');
}

  if(isDemoMode)return; // Never persist demo data

// Add demo banner to render
const origRender2=render;
function sendSuggestion(){
  const o=document.getElementById('modalOverlay'),c=document.getElementById('modalContent');
  o.classList.add('open');
  c.innerHTML=`<h2>💡 ENVIAR SUGESTÃO</h2>
    <p style="color:var(--mu);font-size:12px;margin-bottom:12px">Sua opinião é importante! Envie sua sugestão, crítica ou ideia para melhorar o app.</p>
    <label>Seu Nome</label>
    <input id="sugName" value="${S.currentUser||''}" placeholder="Seu nome">
    <label>Sua Sugestão</label>
    <textarea id="sugText" rows="4" placeholder="Escreva sua sugestão aqui..." style="width:100%;padding:10px;background:#f9f9f5;border:1px solid var(--border2);border-radius:8px;color:var(--tx);font-size:14px;font-family:var(--fn);resize:vertical"></textarea>
    <div class="modal-actions">
      <button class="btn btn-green" style="flex:1" onclick="doSendSuggestion()">Enviar</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
    </div>`;

function doSendSuggestion(){
  const name=document.getElementById('sugName').value.trim();
  const text=document.getElementById('sugText').value.trim();
  if(!text)return toast('Escreva sua sugestão');
  // Send via formsubmit.co (email never exposed to client)
  const fd=new FormData();
  fd.append('name',name||'Anônimo');
  fd.append('message',text);
  fd.append('_subject','Sugestão Bolão Copa 2026 - '+name);
  fd.append('_template','box');
  fetch('https://formsubmit.co/ajax/b8e2a1c5d3f4e6a7b9c0d1e2f3a4b5c6',{method:'POST',body:fd})
    .then(()=>{closeModal();toast('✅ Sugestão enviada! Obrigado!')})
    .catch(()=>{
      // Fallback: copy to clipboard
      const msg='Sugestão Bolão Copa 2026\nDe: '+name+'\n\n'+text;
      navigator.clipboard.writeText(msg).catch(()=>{});
      closeModal();toast('📋 Sugestão copiada! Envie manualmente.');
    });
}

render=function(){
  origRender2();
  if(isDemoMode){
    const banner=document.createElement('div');
    banner.id='demoBanner';
    banner.style.cssText='background:var(--gold);color:#000;text-align:center;padding:6px 16px;font-size:12px;font-weight:700;font-family:var(--fc);z-index:99;display:flex;justify-content:center;align-items:center;gap:12px;letter-spacing:1px';
    banner.innerHTML='🎮 MODO DEMONSTRAÇÃO — dados fictícios <button onclick="exitDemo()" style="background:#000;color:var(--gold);border:none;padding:4px 12px;border-radius:4px;font-size:11px;font-family:var(--fc);font-weight:700;cursor:pointer">✕ Sair da demo</button>';
    const old=document.getElementById('demoBanner');
    if(old)old.remove();
    const navEl=document.getElementById('mainNav');
    if(navEl)navEl.after(banner);
    else document.body.prepend(banner);
  } else {
    const old=document.getElementById('demoBanner');
    if(old)old.remove();
  }
};

render();
